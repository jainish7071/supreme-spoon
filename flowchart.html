<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Generation Workflow</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7fb; margin: 0; padding: 32px; }
    .container { max-width: 1080px; margin: 0 auto; }
    h1 { text-align: center; color: #2c3e50; }
    svg { width: 100%; height: auto; }
    .box { fill: #ffffff; stroke: #3b82f6; stroke-width: 2; rx: 14; ry: 14; }
    .box-alt { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 14; ry: 14; }
    .text { font-size: 16px; fill: #111827; }
    .arrow { fill: none; stroke: #111827; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Video Generation Workflow</h1>
    <svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
        </marker>
      </defs>
      <rect class="box" x="360" y="20" width="480" height="110" />
      <text class="text" x="600" y="60" text-anchor="middle" font-weight="700">Daily Scheduler</text>
      <text class="text" x="600" y="86" text-anchor="middle">Trigger at 10:00 AM every day</text>

      <rect class="box-alt" x="360" y="160" width="480" height="110" />
      <text class="text" x="600" y="200" text-anchor="middle" font-weight="700">Content Generation</text>
      <text class="text" x="600" y="226" text-anchor="middle">AI script, voice, visuals for reels/shorts</text>

      <rect class="box" x="360" y="300" width="480" height="110" />
      <text class="text" x="600" y="340" text-anchor="middle" font-weight="700">Video Assembly</text>
      <text class="text" x="600" y="366" text-anchor="middle">Create 9-15s Instagram/YT short video</text>

      <rect class="box-alt" x="360" y="440" width="480" height="110" />
      <text class="text" x="600" y="480" text-anchor="middle" font-weight="700">Telegram Review</text>
      <text class="text" x="600" y="506" text-anchor="middle">Send preview, accept/retry/skip options</text>

      <rect class="box" x="360" y="580" width="480" height="110" />
      <text class="text" x="600" y="620" text-anchor="middle" font-weight="700">Approval Logic</text>
      <text class="text" x="600" y="646" text-anchor="middle">If approved → upload / else retry or skip</text>

      <rect class="box-alt" x="360" y="720" width="480" height="110" />
      <text class="text" x="600" y="760" text-anchor="middle" font-weight="700">Publish Scheduler</text>
      <text class="text" x="600" y="786" text-anchor="middle">Upload at best daily peak time</text>

      <path class="arrow" d="M600 130 L600 160" />
      <path class="arrow" d="M600 270 L600 300" />
      <path class="arrow" d="M600 410 L600 440" />
      <path class="arrow" d="M600 550 L600 580" />
      <path class="arrow" d="M600 690 L600 720" />

      <rect x="100" y="460" width="180" height="140" rx="14" ry="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
      <text class="text" x="190" y="490" text-anchor="middle" font-weight="700">User Decision</text>
      <text class="text" x="190" y="516" text-anchor="middle">Approve / Retry / Skip</text>
      <text class="text" x="190" y="540" text-anchor="middle">via Telegram bot</text>
      <path class="arrow" d="M420 510 L280 510" />
      <path class="arrow" d="M280 540 L420 540" />
    </svg>
  </div>
</body>
</html>
